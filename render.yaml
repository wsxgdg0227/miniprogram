services:
  - type: web
    name: weixin-cpp-cloud
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DB_URL
        value: sqlite:////data/cpp_template.db
      - key: CPP_API_KEY
        generateValue: true
